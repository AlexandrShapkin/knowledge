name: Update smart sync branch

on:
  push:
    branches:
      - chatgpt/smart-sync
    paths:
      - .github/workflows/rebase-smart-sync.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/smart-sync
          fetch-depth: 0
      - name: Merge current v4
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin v4
          if ! git merge origin/v4 --no-edit; then
            git checkout --theirs package.json
            node - <<'NODE'
            const fs = require('node:fs')
            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
            packageJson.scripts.sync = 'node scripts/smart-sync.mjs'
            packageJson.scripts['sync:test'] = 'node --test scripts/smart-sync.test.mjs'
            fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`)
            NODE
            git add package.json
            remaining="$(git diff --name-only --diff-filter=U)"
            if [ -n "$remaining" ]; then
              echo "$remaining"
              exit 1
            fi
            git commit --no-edit
          fi
          git push origin chatgpt/smart-sync
