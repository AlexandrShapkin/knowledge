name: Finalize content contract

on:
  push:
    branches:
      - docs/content-contract-ready
    paths:
      - .github/workflows/finalize-content-contract.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: docs/content-contract-ready

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Install dependencies
        run: npm ci

      - name: Move SELinux asset and update indexes
        run: |
          mkdir -p 'content/Linux/RHEL/SELinux/!assets'
          git mv \
            'content/Linux/selinux-intro-apache-mariadb.png' \
            'content/Linux/RHEL/SELinux/!assets/selinux-apache-mariadb-access.png'

          python - <<'PY'
          from pathlib import Path

          note = Path('content/Linux/RHEL/SELinux/index.md')
          text = note.read_text(encoding='utf-8')
          old = '../../selinux-intro-apache-mariadb.png'
          new = '!assets/selinux-apache-mariadb-access.png'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one SELinux asset link, found {text.count(old)}')
          note.write_text(text.replace(old, new), encoding='utf-8')
          PY

          npm run content:indexes

      - name: Validate result
        run: npm run content:validate

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content
          git commit -m 'fix(content): move SELinux asset into local assets'
          git push origin docs/content-contract-ready
