name: Apply special directory exclusions

on:
  push:
    branches:
      - docs/content-contract-ready
    paths:
      - .github/workflows/apply-index-skip.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: docs/content-contract-ready

      - name: Exclude special directories
        run: |
          python - <<'PY'
          from pathlib import Path

          file = Path("scripts/ensure-content-indexes.mjs")
          text = file.read_text(encoding="utf-8")
          text = text.replace(
              'if (!entry.isDirectory() || entry.name.startsWith(".")) continue',
              'if (!entry.isDirectory() || entry.name.startsWith(".") || entry.name.startsWith("!")) continue',
          )
          text = text.replace(
              '.filter((entry) => !entry.name.startsWith("."))',
              '.filter((entry) => !entry.name.startsWith(".") && !entry.name.startsWith("!"))',
          )
          file.write_text(text, encoding="utf-8")
          PY

          rm -f scripts/sync-with-validation.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ensure-content-indexes.mjs scripts/sync-with-validation.mjs
          git commit -m "fix(content): skip special directories in index checks"
          git push origin docs/content-contract-ready
