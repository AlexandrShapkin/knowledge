name: Run relative link audit

on:
  pull_request:
    branches:
      - v4
    paths:
      - .github/workflows/run-relative-link-audit.yml
      - quartz.config.ts
      - scripts/check-content-links.mjs
      - package.json
      - content/**

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Install dependencies
        run: npm ci

      - name: Audit content links
        id: links
        continue-on-error: true
        run: node scripts/check-content-links.mjs --report LINK_CHECK_REPORT.json

      - name: Build Quartz
        run: npx quartz build

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: LINK_CHECK_REPORT.json

      - name: Fail on broken links
        if: steps.links.outcome == 'failure'
        run: exit 1
