name: Run content atomicity migration

on:
  push:
    branches:
      - refactor/content-atomicity
    paths:
      - .github/workflows/run-atomicity-refactor.yml
      - scripts/apply-atomicity-refactor.mjs

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refactor/content-atomicity

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Apply atomicity refactor
        run: node scripts/apply-atomicity-refactor.mjs

      - name: Update generated indexes
        run: npm run content:indexes

      - name: Install dependencies
        run: npm ci

      - name: Validate directory indexes
        run: npm run content:indexes:check

      - name: Validate content links
        run: npm run content:links

      - name: Build Quartz
        run: npx quartz build

      - name: Commit decomposed notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "refactor(content): decompose non-atomic notes"
          git push origin refactor/content-atomicity
