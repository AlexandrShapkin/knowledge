name: Run corrected link migration

on:
  push:
    branches:
      - refactor/content-links-v2
    paths:
      - .github/workflows/run-link-migration-v2.yml
      - scripts/migrate-content-links.mjs
      - content/**

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refactor/content-links-v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Migrate content links
        run: node scripts/migrate-content-links.mjs

      - name: Verify wiki links are absent
        run: |
          if grep -R -n -E '\[\[|!\[\[' content --include='*.md'; then
            echo 'Wiki links remain in content/'
            exit 1
          fi

      - name: Build Quartz
        run: |
          npm ci
          npx quartz build

      - name: Commit migration report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content LINK_MIGRATION_REPORT.json
          if git diff --cached --quiet; then
            echo "No additional changes"
            exit 0
          fi
          git commit -m "refactor(content): validate migrated links"
          git push origin refactor/content-links-v2
