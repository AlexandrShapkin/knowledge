name: Apply user documentation

on:
  push:
    branches:
      - ai/documentation-and-sync-v2
    paths:
      - .github/workflows/apply-user-documentation.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ai/documentation-and-sync-v2
      - name: Write documentation
        env:
          DOCS_ARCHIVE: 
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          import os
          from pathlib import Path

          documents = json.loads(gzip.decompress(base64.b64decode(os.environ['DOCS_ARCHIVE'])))
          for name, content in documents.items():
              Path(name).write_text(content, encoding='utf-8')
          PY
      - name: Remove temporary workflows
        run: |
          rm -f .github/workflows/apply-user-documentation.yml
          rm -f .github/workflows/prepare-documentation-sync.yml
      - name: Commit documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CONTRIBUTING.md SMART_SYNC.md AGENTS.md package.json .github/workflows
          git commit -m "Rewrite user and contributor documentation"
          git push origin ai/documentation-and-sync-v2
