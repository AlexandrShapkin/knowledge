name: Preview content index generation

on:
  pull_request:
    branches:
      - v4
    paths:
      - .github/workflows/run-index-generation.yml
      - scripts/ensure-content-indexes.mjs
      - package.json
      - content/**

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Generate missing indexes
        run: npm run content:indexes -- --report INDEX_GENERATION_REPORT.json

      - name: Validate generated indexes
        run: npm run content:indexes:check

      - name: Install dependencies
        run: npm ci

      - name: Validate links
        id: links
        continue-on-error: true
        run: npm run content:links -- --report LINK_CHECK_REPORT.json

      - name: Build Quartz
        if: steps.links.outcome == 'success'
        run: npx quartz build

      - name: Upload generated indexes and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content-indexes
          path: |
            content/**/index.md
            INDEX_GENERATION_REPORT.json
            LINK_CHECK_REPORT.json

      - name: Fail on broken links
        if: steps.links.outcome == 'failure'
        run: exit 1
