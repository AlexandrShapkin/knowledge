name: Run connectivity audit

on:
  push:
    branches:
      - refactor/content-connectivity
    paths:
      - .github/workflows/run-connectivity-audit.yml
      - scripts/audit-connectivity.mjs

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refactor/content-connectivity

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Audit connectivity
        run: node scripts/audit-connectivity.mjs

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONNECTIVITY_AUDIT.json
          git commit -m "chore(content): generate connectivity audit"
          git push origin refactor/content-connectivity
