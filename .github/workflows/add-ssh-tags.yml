name: Add SSH note tags

on:
  push:
    paths:
      - .github/workflows/add-ssh-tags.yml

permissions:
  contents: write

jobs:
  update-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update SSH note tags
        run: |
          python - <<'PY'
          from pathlib import Path

          tags = {
              Path('content/ssh/SSH Agent.md'): ['ssh', 'security', 'authentication', 'ssh-agent'],
              Path('content/ssh/SSH Config.md'): ['ssh', 'configuration', 'network'],
              Path('content/ssh/Диагностика SSH.md'): ['ssh', 'troubleshooting', 'network'],
              Path('content/ssh/SSH ключи/index.md'): ['ssh', 'security', 'authentication', 'cryptography'],
              Path('content/ssh/SSH ключи/Генерация ED25519 ключа.md'): ['ssh', 'security', 'cryptography', 'ed25519'],
              Path('content/ssh/SSH ключи/Добавление публичного ключа на сервер.md'): ['ssh', 'authentication', 'security'],
          }

          for path, values in tags.items():
              text = path.read_text(encoding='utf-8')
              lines = text.splitlines()
              if not lines or lines[0] != '---':
                  raise RuntimeError(f'No frontmatter in {path}')

              end = lines.index('---', 1)
              frontmatter = lines[1:end]

              try:
                  tags_index = next(i for i, line in enumerate(frontmatter) if line.startswith('tags:'))
                  stop = tags_index + 1
                  while stop < len(frontmatter) and (frontmatter[stop].startswith('  -') or not frontmatter[stop].strip()):
                      stop += 1
                  frontmatter[tags_index:stop] = ['tags:'] + [f'  - {tag}' for tag in values]
              except StopIteration:
                  frontmatter.append('tags:')
                  frontmatter.extend(f'  - {tag}' for tag in values)

              result = ['---', *frontmatter, '---', *lines[end + 1:]]
              path.write_text('\n'.join(result) + ('\n' if text.endswith('\n') else ''), encoding='utf-8')

          Path('.github/workflows/add-ssh-tags.yml').unlink()
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ssh .github/workflows/add-ssh-tags.yml
          git commit -m "Add tags to all SSH notes"
          git push origin v4