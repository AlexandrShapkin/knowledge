name: Migrate content to wikilinks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.pull_request.head.ref == 'feat-wikilinks' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npm run install-plugins

      - name: Regenerate section indexes
        run: npm run content:indexes

      - name: Migrate internal Markdown links
        run: npm run content:wikilinks

      - name: Verify migration completeness
        run: npm run content:wikilinks:check

      - name: Commit migrated content
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- content)" ]]; then
            echo "No content changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "refactor(content): migrate internal links to wikilinks"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Validate content and save diagnostics
        shell: bash
        run: |
          set +e
          npm run content:validate > wikilink-validation.txt 2>&1
          status=$?
          cat wikilink-validation.txt
          if [[ $status -ne 0 ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add wikilink-validation.txt
            git commit -m "test(content): capture wikilink validation report"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          else
            rm -f wikilink-validation.txt
          fi
          exit $status

      - name: Test project tooling
        run: npm run sync:test

      - name: Type-check Quartz
        run: npx tsc --noEmit

      - name: Build Quartz
        run: npx quartz build
