name: Migrate content to wikilinks

on:
  push:
    branches:
      - feat-wikilinks
    paths:
      - .github/workflows/migrate-wikilinks.yml

permissions:
  contents: write

jobs:
  migrate:
    if: contains(github.event.head_commit.message, '[run-wikilink-migration]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npm run install-plugins

      - name: Regenerate section indexes
        run: npm run content:indexes

      - name: Migrate internal Markdown links
        run: npm run content:wikilinks

      - name: Verify migration completeness
        run: npm run content:wikilinks:check

      - name: Validate content
        run: npm run content:validate

      - name: Test project tooling
        run: npm run sync:test

      - name: Type-check Quartz
        run: npx tsc --noEmit

      - name: Build Quartz
        run: npx quartz build

      - name: Commit migrated content
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- content)" ]]; then
            echo "No content changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git diff --cached --check
          git commit -m "refactor(content): migrate internal links to wikilinks"
          git push origin HEAD:feat-wikilinks
