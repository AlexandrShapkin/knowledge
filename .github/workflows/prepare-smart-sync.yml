name: Prepare smart sync

on:
  push:
    branches:
      - chatgpt/smart-sync
    paths:
      - .github/workflows/prepare-smart-sync.yml

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/smart-sync
      - uses: actions/setup-node@v6
        with:
          node-version: 22.17
      - name: Update package scripts
        run: |
          node - <<'NODE'
          const fs = require('node:fs')
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          packageJson.scripts.sync = 'node scripts/smart-sync.mjs'
          packageJson.scripts['sync:test'] = 'node --test scripts/smart-sync.test.mjs'
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`)
          NODE
      - name: Test smart sync
        run: node --test scripts/smart-sync.test.mjs
      - name: Commit package scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Add smart sync npm commands"
          git push origin chatgpt/smart-sync
