name: Validate Quartz site

on:
  pull_request:
    branches:
      - main
    paths:
      - content/**
      - scripts/**
      - quartz/**
      - package.json
      - package-lock.json
      - quartz.config.yaml
      - quartz.lock.json
      - quartz.ts
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npm run install-plugins

      - name: Test directory index rules
        run: node --test scripts/ensure-content-indexes.test.mjs

      - name: Validate content
        run: npm run content:validate

      - name: Test synchronization
        run: npm run sync:test

      - name: Type-check Quartz
        run: npx tsc --noEmit

      - name: Build Quartz
        run: npx quartz build

      - name: Verify Obsidian metadata is not published
        shell: bash
        run: |
          matches="$(find public \( -path '*/!Meta' -o -path '*/!Meta/*' -o -path '*/%21Meta' -o -path '*/%21Meta/*' \) -print)"
          if [[ -n "$matches" ]]; then
            echo "Obsidian metadata was published:"
            echo "$matches"
            exit 1
          fi
