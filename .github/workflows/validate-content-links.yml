name: Validate content

on:
  pull_request:
    branches:
      - v4
    paths:
      - content/**
      - quartz.config.ts
      - scripts/check-content-links.mjs
      - scripts/ensure-content-indexes.mjs
      - package.json
      - .github/workflows/validate-content-links.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Install dependencies
        run: npm ci

      - name: Validate directory indexes
        run: npm run content:indexes:check

      - name: Validate content links
        run: npm run content:links

      - name: Build Quartz
        run: npx quartz build
