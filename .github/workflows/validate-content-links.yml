name: Validate content

on:
  pull_request:
    branches:
      - v4
    paths:
      - content/**
      - templates/**
      - CONTENT_RULES.md
      - package.json
      - package-lock.json
      - scripts/**
      - .github/workflows/validate-content-links.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/empty-directory-indexes

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Finalize documentation and workflow
        run: |
          node scripts/finalize-empty-directory-rule.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CONTENT_RULES.md CONTRIBUTING.md SMART_SYNC.md AGENTS.md content/Формат\ заметок.md .github/workflows/validate-content-links.yml scripts/finalize-empty-directory-rule.mjs
          git commit -m "docs(content): clarify empty directory rule"
          git push origin fix/empty-directory-indexes

      - name: Install dependencies
        run: npm ci

      - name: Test directory index rules
        run: node --test scripts/ensure-content-indexes.test.mjs

      - name: Validate directory indexes
        run: npm run content:indexes:check

      - name: Validate links, metadata and assets
        run: node scripts/check-content-links.mjs --report content-validation-report.json

      - name: Test synchronization
        run: npm run sync:test

      - name: Build Quartz
        run: npx quartz build
