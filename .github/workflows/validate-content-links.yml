name: Validate content

on:
  pull_request:
    branches:
      - v4
    paths:
      - content/**
      - templates/**
      - CONTENT_RULES.md
      - package.json
      - package-lock.json
      - scripts/check-content-links.mjs
      - scripts/ensure-content-indexes.mjs
      - scripts/repository-sync.mjs
      - scripts/repository-sync-core.mjs
      - scripts/repository-sync.test.mjs
      - .github/workflows/validate-content-links.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: docs/content-contract-ready

      - name: Move remaining SELinux asset
        run: |
          if [ -f 'content/Linux/selinux-intro-apache-mariadb.png' ]; then
            mkdir -p 'content/Linux/RHEL/SELinux/!assets'
            git mv \
              'content/Linux/selinux-intro-apache-mariadb.png' \
              'content/Linux/RHEL/SELinux/!assets/selinux-apache-mariadb-access.png'

            python - <<'PY'
          from pathlib import Path

          note = Path('content/Linux/RHEL/SELinux/index.md')
          text = note.read_text(encoding='utf-8')
          old = '../../selinux-intro-apache-mariadb.png'
          new = '!assets/selinux-apache-mariadb-access.png'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one SELinux asset link, found {text.count(old)}')
          note.write_text(text.replace(old, new), encoding='utf-8')
          PY

            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add content
            git commit -m 'fix(content): move SELinux asset into local assets'
            git push origin HEAD:docs/content-contract-ready
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Install dependencies
        run: npm ci

      - name: Refresh generated indexes
        run: npm run content:indexes

      - name: Validate directory indexes
        id: indexes
        continue-on-error: true
        run: npm run content:indexes:check

      - name: Validate links, metadata and assets
        id: content
        continue-on-error: true
        run: node scripts/check-content-links.mjs --report content-validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: content-validation-report
          path: content-validation-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail on validation errors
        if: steps.indexes.outcome == 'failure' || steps.content.outcome == 'failure'
        run: exit 1

      - name: Test synchronization
        run: npm run sync:test

      - name: Build Quartz
        run: npx quartz build
