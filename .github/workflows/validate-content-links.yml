name: Validate content

on:
  pull_request:
    branches:
      - v4
    paths:
      - content/**
      - templates/**
      - scripts/check-content-links.mjs
      - scripts/repository-sync.mjs
      - scripts/repository-sync-core.mjs
      - .github/workflows/validate-content-links.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17

      - name: Install dependencies
        run: npm ci

      - name: Validate directory indexes
        shell: bash
        run: |
          failed=0
          while IFS= read -r directory; do
            if [ ! -f "$directory/index.md" ]; then
              echo "Missing index.md: $directory"
              failed=1
            fi
          done < <(find content -type d \( -name '.*' -o -name '!*' \) -prune -o -type d -print)
          exit "$failed"

      - name: Validate content contract
        run: npm run content:links

      - name: Test synchronization
        run: npm run sync:test

      - name: Build Quartz
        run: npx quartz build
